<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拉法業務分析儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans TC',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  header{background:#1a1a1a;color:#fff;padding:16px 24px;display:flex;align-items:center;gap:16px}
  header h1{font-size:18px;font-weight:700;letter-spacing:.05em}
  header span{font-size:12px;color:#999;margin-left:auto}
  .tabs{display:flex;gap:0;background:#fff;border-bottom:1px solid #e5e3df;padding:0 24px}
  .tab{padding:12px 18px;font-size:13px;cursor:pointer;color:#666;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
  .tab:hover{color:#1a1a1a}
  .tab.active{color:#1a1a1a;font-weight:500;border-bottom-color:#1a1a1a}
  .content{padding:20px 24px;max-width:1200px}
  .section{display:none}.section.active{display:block}
  .metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
  .metric{background:#fff;border-radius:8px;padding:12px 14px;border:1px solid #e5e3df}
  .metric-label{font-size:11px;color:#888;margin-bottom:4px}
  .metric-value{font-size:22px;font-weight:700;color:#1a1a1a}
  .metric-sub{font-size:11px;margin-top:2px}
  .up{color:#2a9d5c}.down{color:#e05252}
  .chart-wrap{position:relative;background:#fff;border-radius:8px;padding:16px;border:1px solid #e5e3df;margin-bottom:16px}
  .chart-label{font-size:12px;color:#888;margin-bottom:10px;font-weight:500}
  .sp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;margin-bottom:16px}
  .sp-card{background:#fff;padding:10px 12px;border-radius:8px;border:1px solid #e5e3df;cursor:pointer;transition:all .15s;border-left-width:3px}
  .sp-card:hover{border-color:#aaa}
  .sp-card.selected{border-top-width:2px;border-right-width:2px;border-bottom-width:2px}
  .sp-name{font-size:13px;font-weight:700;margin-bottom:2px}
  .sp-meta{font-size:11px;color:#888}
  .sp-yoy{font-size:11px;margin-top:3px;font-weight:500}
  .ctrl-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  select,input[type=text]{font-size:13px;padding:6px 10px;border-radius:6px;border:1px solid #d5d3cf;background:#fff;color:#1a1a1a;outline:none}
  select:focus,input:focus{border-color:#888}
  .sort-btn{font-size:11px;padding:4px 9px;border-radius:5px;border:1px solid #d5d3cf;cursor:pointer;background:#fff;color:#666;transition:all .1s}
  .sort-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
  .count-label{font-size:12px;color:#888;margin-bottom:6px}
  table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e5e3df}
  thead tr{background:#f5f4f0}
  th{padding:8px 10px;text-align:left;font-weight:500;font-size:11px;color:#666;border-bottom:1px solid #e5e3df}
  td{padding:7px 10px;border-bottom:1px solid #f0eeea;color:#1a1a1a}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafaf8;cursor:pointer}
  .code-pill{font-family:monospace;font-size:11px;background:#f0eeea;padding:1px 5px;border-radius:3px}
  .drill-content{display:none}
</style>
</head>
<body>
<header>
  <h1>拉法業務分析儀表板</h1>
  <span>2017–2026 · 9位業務 · 266個區域</span>
</header>
<div class="tabs">
  <div class="tab active" onclick="showTab('overview')">整體概覽</div>
  <div class="tab" onclick="showTab('drill')">業務 × 區域</div>
  <div class="tab" onclick="showTab('compare')">區域年趨勢</div>
</div>
<div class="content">

<!-- 整體概覽 -->
<div id="overview" class="section active">
  <div class="metric-grid" id="ovMetrics"></div>
  <div class="chart-wrap"><div class="chart-label">全公司年度業績（2022年為高峰，紅色標示）</div><div style="position:relative;height:240px"><canvas id="ovChart"></canvas></div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="chart-wrap"><div class="chart-label">2025 各業務員 YoY 成長率</div><div style="position:relative;height:260px"><canvas id="yoyChart"></canvas></div></div>
    <div class="chart-wrap"><div class="chart-label">各業務員累計業績佔比</div><div style="position:relative;height:260px"><canvas id="pieChart"></canvas></div></div>
  </div>
</div>

<!-- 業務 × 區域 -->
<div id="drill" class="section">
  <div class="sp-grid" id="spGrid"></div>
  <div class="drill-content" id="drillContent">
    <div class="ctrl-row">
      <input type="text" id="regionSearch" placeholder="搜尋地名或區號…" style="flex:1;min-width:120px" oninput="renderRegionTable()">
      <select id="cityFilter" onchange="renderRegionTable()"><option value="">全部縣市</option></select>
      <div style="display:flex;gap:4px">
        <button class="sort-btn active" id="sortTotal" onclick="setSort('total')">總計↓</button>
        <button class="sort-btn" id="sortYoy" onclick="setSort('yoy')">YoY↓</button>
        <button class="sort-btn" id="sortDiff" onclick="setSort('diff')">差額↓</button>
      </div>
    </div>
    <div class="count-label" id="regionCount"></div>
    <div style="overflow-x:auto;margin-bottom:14px">
      <table>
        <thead><tr><th>#</th><th>區號</th><th>縣市</th><th>鄉鎮區</th><th>業務員</th><th>累計</th><th>2024</th><th>2025</th><th>差額</th><th>YoY</th></tr></thead>
        <tbody id="regionTbody"></tbody>
      </table>
    </div>
    <div class="chart-wrap"><div class="chart-label" id="miniLabel"></div><div style="position:relative;height:180px"><canvas id="miniChart"></canvas></div></div>
  </div>
</div>

<!-- 區域年趨勢 -->
<div id="compare" class="section">
  <div class="ctrl-row">
    <select id="compSp" onchange="loadCompareRegions()"><option value="">選業務員</option></select>
    <select id="compRegion" onchange="drawCompareChart()"><option value="">選區域</option></select>
  </div>
  <div class="chart-wrap"><div class="chart-label" id="cmpLabel">選擇業務員與區域後顯示趨勢</div><div style="position:relative;height:260px"><canvas id="compareChart"></canvas></div></div>
  <div class="metric-grid" id="compareStats"></div>
</div>

</div>

  dc('ov');
  const tots=allYr();
  charts['ov']=new Chart(document.getElementById('ovChart'),{type:'bar',data:{labels:YEARS,datasets:[{data:tots,backgroundColor:tots.map((_,i)=>i===5?'#e05252':'#3266ad'),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+Math.round(c.parsed.y).toLocaleString()+'K'}}},scales:{x:{ticks:{autoSkip:false}},y:{ticks:{callback:v=>Math.round(v/1000)+'M'}}}}});
  dc('yoy');
  const yoys=SP_NAMES.map(n=>{const a=spY24(n),b=spY25(n);return a>0?(b-a)/a*100:0;});
  charts['yoy']=new Chart(document.getElementById('yoyChart'),{type:'bar',data:{labels:SP_NAMES,datasets:[{data:yoys,backgroundColor:yoys.map(v=>v>=0?'#2a9d5c':'#e05252'),borderWidth:0}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+(c.parsed.x>=0?'+':'')+c.parsed.x.toFixed(1)+'%'}}},scales:{x:{ticks:{callback:v=>v+'%'}},y:{ticks:{font:{size:12}}}}}});
  dc('pie');
  const colors=Object.values(SP_COLORS);
  charts['pie']=new Chart(document.getElementById('pieChart'),{type:'doughnut',data:{labels:SP_NAMES,datasets:[{data:SP_NAMES.map(n=>spTot(n)),backgroundColor:colors,borderWidth:2,borderColor:'#f5f4f0'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},boxWidth:12,padding:8}},tooltip:{callbacks:{label:c=>' '+Math.round(c.parsed).toLocaleString()+'K'}}}}});
}

function initDrill(){
  document.getElementById('spGrid').innerHTML=SP_NAMES.map(sp=>{
    const tot=spTot(sp),a=spY24(sp),b=spY25(sp);
    const yoy=a>0?((b-a)/a*100):0;
    const c=SP_COLORS[sp];
    return `<div class="sp-card${selSp===sp?' selected':''}" id="spc_${sp}" onclick="selectSp('${sp}')" style="border-left-color:${c}${selSp===sp?';border-top-color:'+c+';border-right-color:'+c+';border-bottom-color:'+c:''}">
      <div class="sp-name" style="color:${c}">${sp}</div>
      <div class="sp-meta">${(tot/1000).toFixed(0)}K · ${RAW[sp].length}區</div>
      <div class="sp-yoy ${yoy>=0?'up':'down'}">${yoy>=0?'+':''}${yoy.toFixed(1)}% 2025</div>
    </div>`;
  }).join('');
  if(selSp)renderRegionTable();
}

function selectSp(sp){
  selSp=sp;
  document.getElementById('drillContent').style.display='block';
  const cf=document.getElementById('cityFilter');
  const cities=[...new Set(RAW[sp].map(r=>r.city))].sort();
  cf.innerHTML='<option value="">全部縣市</option>'+cities.map(c=>`<option>${c}</option>`).join('');
  document.getElementById('regionSearch').value='';
  initDrill();
  renderRegionTable();
  drawMini(sp);
}

function setSort(k){
  if(sortKey===k)sortDir[k]*=-1;else{sortKey=k;sortDir[k]=-1;}
  ['total','yoy','diff'].forEach(s=>{document.getElementById('sort'+s.charAt(0).toUpperCase()+s.slice(1)).classList.toggle('active',s===k);});
  renderRegionTable();
}

function renderRegionTable(){
  if(!selSp)return;
  const q=(document.getElementById('regionSearch').value||'').toLowerCase();
  const cf=document.getElementById('cityFilter').value;
  let data=RAW[selSp].filter(r=>(!q||(r.city+r.dist+r.r).toLowerCase().includes(q))&&(!cf||r.city===cf));
  data=[...data].sort((a,b)=>{const av=sortKey==='yoy'?(a.yoy??-999):a[sortKey];const bv=sortKey==='yoy'?(b.yoy??-999):b[sortKey];return(bv-av)*sortDir[sortKey];});
  document.getElementById('regionCount').textContent=`${selSp} · 顯示 ${data.length} / ${RAW[selSp].length} 個區域`;
  const c=SP_COLORS[selSp];
  document.getElementById('regionTbody').innerHTML=data.map((r,i)=>{
    const ys=r.yoy!=null?(r.yoy>=0?`<span class="up">+${r.yoy}%</span>`:`<span class="down">${r.yoy}%</span>`):'—';
    const ds=r.diff>=0?`<span class="up">+${r.diff.toLocaleString()}</span>`:`<span class="down">${r.diff.toLocaleString()}</span>`;
    return `<tr onclick="goCompare('${selSp}','${r.r}')">
      <td style="color:#aaa">${i+1}</td>
      <td><span class="code-pill">${r.r}</span></td>
      <td>${r.city}</td><td>${r.dist}</td>
      <td style="color:${c};font-weight:500">${selSp}</td>
      <td style="font-weight:500">${r.total.toLocaleString()}</td>
      <td>${r.y24.toLocaleString()}</td><td>${r.y25.toLocaleString()}</td>
      <td>${ds}</td><td>${ys}</td>
    </tr>`;
  }).join('');
}

function drawMini(sp){
  document.getElementById('miniLabel').textContent=sp+' 年度業績走勢（點擊列可查看該區趨勢）';
  dc('mini');
  const tots=YEARS.map((_,i)=>RAW[sp].reduce((s,r)=>s+r.yearly[i],0));
  const c=SP_COLORS[sp];
  charts['mini']=new Chart(document.getElementById('miniChart'),{type:'line',data:{labels:YEARS,datasets:[{data:tots,borderColor:c,backgroundColor:c+'22',fill:true,borderWidth:2,tension:.3,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>' '+Math.round(v.parsed.y).toLocaleString()+'K'}}},scales:{x:{ticks:{autoSkip:false}},y:{ticks:{callback:v=>Math.round(v/1000)+'M'}}}}});
}

function initCompare(){
  const s=document.getElementById('compSp');
  if(s.options.length===1)SP_NAMES.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;s.appendChild(o);});
  if(selSp){s.value=selSp;loadCompareRegions();}
}

function loadCompareRegions(){
  const sp=document.getElementById('compSp').value;
  const rs=document.getElementById('compRegion');
  rs.innerHTML='<option value="">選區域</option>';
  if(!sp)return;
  [...RAW[sp]].sort((a,b)=>b.total-a.total).forEach(r=>{const o=document.createElement('option');o.value=r.r;o.textContent=r.r+' '+r.city+r.dist;rs.appendChild(o);});
}

function drawCompareChart(){
  const sp=document.getElementById('compSp').value;
  const rc=document.getElementById('compRegion').value;
  if(!sp||!rc)return;
  const r=RAW[sp].find(x=>x.r===rc);
  if(!r)return;
  document.getElementById('cmpLabel').textContent=r.city+r.dist+'（'+r.r+'）年度趨勢';
  dc('cmp');
  const col=SP_COLORS[sp];
  charts['cmp']=new Chart(document.getElementById('compareChart'),{type:'bar',data:{labels:YEARS,datasets:[{data:r.yearly,backgroundColor:r.yearly.map((_,i)=>i===8?col:col+'88'),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+Math.round(c.parsed.y).toLocaleString()+'K'}}},scales:{x:{ticks:{autoSkip:false}},y:{ticks:{callback:v=>Math.round(v/1000)+'M'}}}}});
  const yoy=r.yoy!=null?`<span class="${r.yoy>=0?'up':'down'}">${r.yoy>=0?'+':''}${r.yoy}%</span>`:'—';
  document.getElementById('compareStats').innerHTML=`
    <div class="metric"><div class="metric-label">累計業績</div><div class="metric-value">${r.total.toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">2024</div><div class="metric-value">${r.y24.toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">2025</div><div class="metric-value">${r.y25.toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">YoY</div><div class="metric-value" style="font-size:18px">${yoy}</div><div class="metric-sub" style="color:#888">差額 ${r.diff>=0?'+':''}${r.diff.toLocaleString()}</div></div>`;
}

function goCompare(sp,r){
  showTab('compare');
  document.getElementById('compSp').value=sp;
  loadCompareRegions();
  document.getElementById('compRegion').value=r;
  drawCompareChart();
}

function showTab(name){
  const tabs=['overview','drill','compare'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',tabs[i]===name));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  if(name==='overview')initOverview();
  else if(name==='drill')initDrill();
  else if(name==='compare')initCompare();
}

initOverview();
</script>
</body>
</html>
